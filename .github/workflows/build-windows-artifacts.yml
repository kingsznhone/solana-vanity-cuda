name: Build Windows artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows CUDA artifacts
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda
        with:
          cuda: 12.9.1
          method: network

      - name: Install OpenSSL
        shell: pwsh
        run: choco install openssl --no-progress -y

      - name: Build universal Windows release binary
        shell: pwsh
        run: |
          $buildPath = "build-universal"
          $architectures = "50;52;53;60;61;62;70;72;75;80;86;87;89;90;100;101;103;120;121"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $buildPath, "artifacts"
          & cmake -S . -B $buildPath -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CUDA_COMPILER="${{ steps.cuda.outputs.CUDA_PATH }}/bin/nvcc.exe" `
            "-DCMAKE_CUDA_ARCHITECTURES=$architectures" `
            -DVANITY_MAX_REGISTER_COUNT=128 `
            -DVANITY_THREADS_PER_BLOCK=512 `
            -DVANITY_ATTEMPTS_PER_EXECUTION=10000
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & cmake --build $buildPath --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Copy-Item "$buildPath/release/solana-vanity-cuda.exe" "artifacts/solana-vanity-cuda-windows-x86_64.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: solana-vanity-cuda-windows
          path: artifacts/solana-vanity-cuda-windows-x86_64.exe
          if-no-files-found: error
          retention-days: 14
