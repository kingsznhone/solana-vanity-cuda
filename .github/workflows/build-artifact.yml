name: Build Linux CUDA artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Linux CUDA artifacts sequentially
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install --no-install-recommends -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libssl-dev

      - name: Build universal Linux release binary
        env:
          CUDA_ARCHITECTURES: universal
          VANITY_MAX_REGISTER_COUNT: '128'
          VANITY_THREADS_PER_BLOCK: '512'
          VANITY_ATTEMPTS_PER_EXECUTION: '10000'
          BUILD_TYPE: Release
        run: |
          rm -rf build-universal artifacts
          BUILD_DIR="${GITHUB_WORKSPACE}/build-universal" bash ./run build
          test -x build-universal/release/solana-vanity-cuda
          mkdir -p artifacts
          cp build-universal/release/solana-vanity-cuda \
            artifacts/solana-vanity-cuda-linux-x86_64

      - name: Upload universal Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: solana-vanity-cuda-linux-x86_64
          path: artifacts/solana-vanity-cuda-linux-x86_64
          if-no-files-found: error
          retention-days: 14
